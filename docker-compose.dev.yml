version: '3.8'

services:
  modbus-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modbus-tcp-server-dev
    ports:
      - "8082:8080"  # Web API порт
      - "5021:502"   # Modbus TCP порт
    environment:
      - WEB_SERVER_PORT=8080
      - MB_SERVER_PORT=502
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - modbus-network

networks:
  modbus-network:
    driver: bridge 