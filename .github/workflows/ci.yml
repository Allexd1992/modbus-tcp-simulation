# CI: GitHub Actions; Gitea Actions uses this path if `.gitea/workflows` is absent.
# Runners: set labels (e.g. ubuntu-latest) in Administration → Actions → Runners.
# Docker push: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (image: DOCKERHUB_IMAGE in docker-build-push job).
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  debug-info:
    name: Workflow Debug Info
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow info
        run: |
          echo "=== Workflow Triggered ==="
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "=========================="

  lint-rust:
    name: Lint Rust (fmt + clippy)
    runs-on: ubuntu-latest
    needs: [debug-info]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

  lint-dockerfile:
    name: Lint Dockerfile (Hadolint)
    runs-on: ubuntu-latest
    needs: [debug-info]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  test:
    name: Cargo test
    runs-on: ubuntu-latest
    needs: [lint-rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  build:
    name: Build release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release
        run: cargo build --release --verbose

  docker-build-push:
    name: Build and push Docker image (Docker Hub only)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    env:
      DOCKERHUB_IMAGE: allexd2010/modbus-server-sim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" =~ ^refs/tags/v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            VERSION="${REF#refs/tags/}"
            if [[ ! "$VERSION" =~ ^v ]]; then
              VERSION="v${VERSION}"
            fi
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "Release build: ${VERSION}"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Branch/test build"
          fi

      - name: Set up QEMU (for linux/arm64 on release)
        if: steps.meta.outputs.is_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (branch / test)
        if: steps.meta.outputs.is_release != 'true'
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          HUB="${DOCKERHUB_IMAGE}"
          docker buildx build \
            --platform linux/amd64 \
            -t ${HUB}:sha-${SHORT_SHA} \
            -t ${HUB}:test \
            --push .

      - name: Build and push (release tag)
        if: steps.meta.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          HUB="${DOCKERHUB_IMAGE}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${HUB}:latest \
            -t ${HUB}:${VERSION} \
            --push .

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - lint-rust
      - lint-dockerfile
      - test
      - build
    if: success()
    steps:
      - name: OK
        run: echo "Lint, test, and build passed."
