image: rust:latest
stages: 
  - build
  - docker-build

job-build: 
  tags:
    - build      # This job runs in the build stage, which runs first.
  stage: build
  script:
    - cargo build --release

job-docker-build: 
  image: docker:20.10.16
  tags:
    - build      # This job runs in the build stage, which runs first.
  stage: docker-build
  rules:
    - if: '$CI_COMMIT_TAG == null'
  script:
    - echo  $CI_COMMIT_TAG
    - echo  $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - echo build image from repository ./Dockerfile       
    - docker build -t $CI_REGISTRY:test . -f ./Dockerfile 
    - echo Push image to repository $CI_REGISTRY:test
    - docker push $CI_REGISTRY:test
    - docker logout
