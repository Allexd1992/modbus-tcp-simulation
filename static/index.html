<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#16213e" />
  <meta name="application-name" content="Modbus Sim" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Modbus Sim" />
  <title data-i18n="app.title">Modbus TCP Server Simulation</title>
  <link rel="manifest" href="/ui/manifest.json" />
  <link rel="icon" href="/ui/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/ui/icons/icon.svg" />
  <script>
    (function () {
      try {
        var k = "apcs-ui-theme";
        var s = localStorage.getItem(k);
        if (s === "dark" || s === "light") {
          document.documentElement.setAttribute("data-theme", s);
        } else {
          document.documentElement.setAttribute(
            "data-theme",
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
          );
        }
      } catch (e) {}
      try {
        var lk = "apcs-ui-lang";
        var ls = localStorage.getItem(lk);
        document.documentElement.setAttribute(
          "lang",
          ls === "ru" || ls === "en" ? ls : "en"
        );
      } catch (e2) {
        document.documentElement.setAttribute("lang", "en");
      }
    })();
  </script>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <div class="mfc-window">
    <header class="mfc-titlebar">
      <span class="mfc-title" data-i18n="app.title">Modbus TCP Server Simulation</span>
      <div class="mfc-title-actions">
        <div
          class="lang-switch"
          role="group"
          data-i18n-attr="aria-label:lang.switch"
          aria-label="Language"
        >
          <button type="button" class="lang-btn" data-lang="en" id="langEn">EN</button>
          <button type="button" class="lang-btn" data-lang="ru" id="langRu">RU</button>
        </div>
        <button
          type="button"
          id="themeToggle"
          class="theme-toggle"
          data-i18n-attr="title:theme.title;aria-label:theme.aria"
          title="Light / dark theme"
          aria-label="Toggle theme"
        >
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
        <div class="mcp-ai-wrap">
          <button
            type="button"
            id="mcpAiBtn"
            class="mcp-ai-btn"
            aria-expanded="false"
            aria-controls="mcpAiPanel"
            data-i18n-attr="title:mcpAi.title"
            title="MCP — AI access"
          >
            <svg class="mcp-ai-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                fill="currentColor"
                d="M9 4.5a.75.75 0 01.721.544l.813 2.846a3.75 3.75 0 002.576 2.576l2.846.813a.75.75 0 010 1.442l-2.846.813a3.75 3.75 0 00-2.576 2.576l-.813 2.846a.75.75 0 01-1.442 0l-.813-2.846a3.75 3.75 0 00-2.576-2.576l-2.846-.813a.75.75 0 010-1.442l2.846-.813a3.75 3.75 0 002.576-2.576l.813-2.846A.75.75 0 019 4.5zm8.38 9.5a.75.75 0 01.372.648l-.117 1.005a.75.75 0 01-.648.648l-1.005.117a.75.75 0 01-.768-.768l.117-1.005a.75.75 0 01.648-.648l1.005-.117z"
              />
            </svg>
            <span class="mcp-ai-label">AI</span>
          </button>
          <div
            id="mcpAiPanel"
            class="mcp-ai-panel"
            role="dialog"
            aria-labelledby="mcpAiHeading"
            hidden
          >
            <div class="mcp-ai-panel-inner">
              <h3 id="mcpAiHeading" class="mcp-ai-heading" data-i18n="mcp.heading">MCP for AI</h3>
              <p class="mcp-ai-lead" data-i18n="mcp.lead"></p>
              <ul class="mcp-ai-list">
                <li data-i18n="mcp.li1"></li>
                <li id="mcpAiUrlLine"></li>
                <li data-i18n="mcp.li3"></li>
                <li data-i18n="mcp.li4"></li>
                <li data-i18n="mcp.li5"></li>
                <li data-i18n="mcp.li6"></li>
              </ul>
              <p class="mcp-ai-config-title" data-i18n="mcp.configTitle">Cursor configuration example</p>
              <p class="mcp-ai-config-hint" data-i18n="mcp.configHint"></p>
              <pre class="mcp-ai-pre" id="mcpCursorConfig" data-i18n-attr="aria-label:mcp.preAria"><code id="mcpCursorConfigCode">{}</code></pre>
              <div class="mcp-ai-panel-actions">
                <button type="button" class="mcp-ai-dl" id="mcpConfigDownload" data-i18n="mcp.download">
                  Download mcp.json
                </button>
                <button type="button" class="mcp-ai-close" id="mcpAiClose" data-i18n="mcp.close">Close</button>
              </div>
            </div>
          </div>
        </div>
        <a class="mfc-link" href="/api/v1/swagger/" target="_blank" rel="noopener" data-i18n="swagger">Swagger</a>
      </div>
    </header>

    <div class="mfc-tabs" role="tablist" data-i18n-attr="aria-label:tabs.aria" aria-label="Modbus table">
      <button type="button" class="mfc-tab active" data-kind="holding" role="tab" aria-selected="true" title="FC 03/16">
        <span class="tab-num">4x</span> <span data-i18n="tab.holding">Holding registers</span>
      </button>
      <button type="button" class="mfc-tab" data-kind="input" role="tab" title="FC 04">
        <span class="tab-num">3x</span> <span data-i18n="tab.input">Input registers</span>
      </button>
      <button type="button" class="mfc-tab" data-kind="coil" role="tab" title="FC 01/05">
        <span class="tab-num">0x</span> <span data-i18n="tab.coil">Coils</span>
      </button>
      <button type="button" class="mfc-tab" data-kind="dinput" role="tab" title="FC 02">
        <span class="tab-num">1x</span> <span data-i18n="tab.dinput">Discrete inputs</span>
      </button>
    </div>

    <select id="kind" class="visually-hidden" aria-hidden="true" tabindex="-1">
      <option value="holding" selected>Holding</option>
      <option value="input">Input</option>
      <option value="coil">Coil</option>
      <option value="dinput">DInput</option>
    </select>

    <div class="mfc-toolbar">
      <div class="tb-group">
        <span class="tb-label" data-i18n="label.offset">Offset</span>
        <input id="addr" type="number" min="0" max="65534" value="0" data-i18n-attr="title:addr.title" title="" />
        <span class="tb-label" data-i18n="label.count">Count</span>
        <input id="cnt" type="number" min="1" max="256" value="16" data-i18n-attr="title:cnt.title" title="" />
        <button type="button" id="btnRead" class="mfc-btn mfc-btn-default" data-i18n="btn.refresh">Refresh</button>
      </div>
      <div class="tb-sep"></div>
      <div class="tb-group tb-poll-group">
        <label class="tb-poll-label" data-i18n-attr="title:poll.title" title="">
          <input type="checkbox" id="pollEnabled" checked />
          <span data-i18n="label.auto">Auto</span>
        </label>
        <span class="tb-label" data-i18n="label.interval">Interval</span>
        <input
          id="pollIntervalSec"
          type="number"
          min="1"
          max="300"
          value="1"
          step="1"
          data-i18n-attr="title:pollInterval.title;aria-label:pollInterval.aria"
          title=""
          aria-label=""
        />
        <span class="tb-poll-unit" data-i18n="poll.unit" aria-hidden="true">s</span>
      </div>
      <div class="tb-sep"></div>
      <div class="tb-group" id="regDisplayOpts">
        <span class="tb-label" data-i18n="label.format">Format</span>
        <select id="displayMode" data-i18n-attr="title:displayMode.title" title="">
          <option value="uint16" data-i18n="fmt.uint16">UInt16</option>
          <option value="int16" data-i18n="fmt.int16">Int16</option>
          <option value="bitmask" data-i18n="fmt.bitmask">Bitmask</option>
          <option value="int32" data-i18n="fmt.int32">Int32</option>
          <option value="float32" data-i18n="fmt.float32">Float</option>
          <option value="float64" data-i18n="fmt.float64">Double</option>
        </select>
        <span id="wordOrderWrap" class="tb-word-order-wrap">
          <span class="tb-label" data-i18n="label.word32">32-bit words</span>
          <select id="wordOrder32" data-i18n-attr="title:wordOrder.title" title="">
            <option value="HL">HL</option>
            <option value="LH">LH</option>
          </select>
        </span>
      </div>
      <div class="tb-sep"></div>
      <div class="tb-group">
        <button type="button" id="btnPrev" class="mfc-btn" data-i18n-attr="title:btn.prev" title="">◀</button>
        <button type="button" id="btnNext" class="mfc-btn" data-i18n-attr="title:btn.next" title="">▶</button>
      </div>
    </div>

    <div class="mfc-grid-wrap">
      <table id="grid" class="mfc-matrix" data-i18n-attr="aria-label:grid.aria" aria-label="">
        <thead id="gridHead">
          <tr id="matrixHeaderRow"></tr>
        </thead>
        <tbody id="gridBody"></tbody>
      </table>
    </div>

    <footer class="mfc-statusbar">
      <span id="areaHint" class="status-part"></span>
      <span class="status-sep">|</span>
      <span id="msg" class="status-msg" role="status"></span>
    </footer>
  </div>

  <script src="/ui/i18n.js"></script>
  <script src="/ui/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("/ui/sw.js", { scope: "/ui/" })
          .catch(function () {});
      });
    }
  </script>
</body>
</html>
