version: '3.8'

services:
  modbus-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modbus-tcp-server-dev
    ports:
      - "9090:9090"  # Web API + UI + Swagger
      - "5021:502"   # Modbus TCP порт
      - "8081:8081"  # MCP (Streamable HTTP /mcp)
    environment:
      - WEB_SERVER_PORT=9090
      - MB_SERVER_PORT=502
      - MCP_SERVER_PORT=8081
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - modbus-network

networks:
  modbus-network:
    driver: bridge 